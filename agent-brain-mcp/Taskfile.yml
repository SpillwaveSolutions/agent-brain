# Agent Brain MCP Task Runner
# https://taskfile.dev
#
# Per-package tasks; wired into root before-push and pr-qa-gate as of v10.2
# (Phase 55, closes DR-5 from docs/plans/2026-05-28-mcp-uds-transport-design.md
# §14 #5).

version: '3'

vars:
  PROJECT_NAME: agent-brain-mcp
  SRC_DIR: agent_brain_mcp
  TEST_DIR: tests

env:
  # NB: do NOT add ``./agent_brain_mcp`` to PYTHONPATH — Phase 53 Plan 02
  # introduced ``agent_brain_mcp/http.py`` which, when the parent dir is
  # on PYTHONPATH, shadows the stdlib ``http`` package and breaks anything
  # transitively importing ``http.client`` (e.g., urllib3 → requests →
  # poetry's own console scripts). The poetry-installed package is
  # reachable via the venv site-packages without any PYTHONPATH games.
  PYTHONPATH: './tests'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # ===================
  # Setup
  # ===================

  install:
    desc: Install project dependencies
    cmds:
      - |
        # Monorepo: agent-brain-rag / agent-brain-uds may not be on PyPI
        # yet during development. Temporarily switch to path dependencies
        # for resolution, then restore the PyPI pins.
        if ! poetry install 2>/dev/null; then
          cp pyproject.toml pyproject.toml.bak
          perl -pi -e 's|agent-brain-rag = "\^[0-9]+\.[0-9]+\.[0-9]+"|agent-brain-rag = {path = "../agent-brain-server", develop = false}|' pyproject.toml
          perl -pi -e 's|agent-brain-uds = "\^[0-9]+\.[0-9]+\.[0-9]+"|agent-brain-uds = {path = "../agent-brain-uds", develop = false}|' pyproject.toml
          poetry lock
          poetry install
          mv pyproject.toml.bak pyproject.toml
        fi

  # ===================
  # Build
  # ===================

  clean:
    desc: Remove build artifacts and temporary files
    cmds:
      - rm -rf dist build *.egg-info
      - rm -rf .pytest_cache .mypy_cache .ruff_cache
      - rm -rf htmlcov .coverage coverage.xml
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

  build:
    desc: Build the package
    deps: [clean]
    cmds:
      - poetry build

  # ===================
  # Testing
  # ===================

  test:
    desc: Run unit tests
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}} -v

  test:cov:
    desc: Run tests with coverage report
    aliases: [coverage]
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}} --cov={{.SRC_DIR}} --cov-report=term-missing --cov-report=html

  contract:
    desc: SDK-driven contract tests (stdio + HTTP transports, Phase 55 VAL-01/02/03)
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}}/contract -v -m contract

  e2e:
    desc: End-to-end suite — spawns agent-brain-serve + agent-brain-mcp (slow, Phase 4+)
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}}/e2e -v -m e2e

  mcp:smoke:http:
    desc: Run the Streamable HTTP transport round-trip smoke (drives the official MCP SDK HTTP client)
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}}/test_transport_selection.py {{.TEST_DIR}}/test_http_loopback.py {{.TEST_DIR}}/test_http_negative_paths.py -v -m e2e_http

  mcp:smoke:all:
    desc: Umbrella — fast unit suite + HTTP transport smoke. Stdio surface is covered by the fast lane.
    deps: [install]
    cmds:
      - task: test
      - task: mcp:smoke:http

  stress:orphan-test:
    desc: |
      Phase 60 (MCPHYG-02): 1000-invocation no-orphan stress test. SLOW
      (500-2000s wall-clock). OPT-IN — NOT in `task before-push`. Drives
      McpStdioBackend through a tight query→close loop, asserting psutil
      children delta returns to zero per iteration. Override iteration
      count with AGENT_BRAIN_ORPHAN_TEST_MAX_ITERATIONS.

      Per-package task name is bare ``stress:orphan-test`` (NO ``mcp:``
      prefix) — the root Taskfile's ``includes: mcp:`` alias adds the
      ``mcp:`` namespace automatically, so the root surface is
      ``task mcp:stress:orphan-test`` (mirrors the ``mcp:before-push``
      dispatch idiom — see root Taskfile.yml line 221).
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}}/stress/test_orphan_subprocess.py -v -m stress

  framework-matrix:
    desc: |
      Phase 63 (TOOLING-V3-01): All-framework smoke test runner. SLOW
      (minutes to hours depending on venv cold-start). OPT-IN — NOT in
      `task before-push`. Runs all 7 framework smoke tests sequentially
      (5 Python: openai-agents, langchain, llama-index, pydantic-ai,
      autogen; 2 TypeScript: Mastra + Vercel AI SDK) with per-framework
      self-bootstrap and teardown. Gate: FRAMEWORK_MATRIX=1 env var or
      pass --force.

      Per-package task name is bare ``framework-matrix`` (NO ``mcp:``
      prefix) — the root Taskfile's ``includes: mcp:`` alias adds the
      ``mcp:`` namespace automatically, so the root surface is
      ``task mcp:framework-matrix`` (same dispatch idiom as
      ``task mcp:stress:orphan-test``). Pass --force via
      ``task mcp:framework-matrix -- --force``.
    cmds:
      - bash "$(git rev-parse --show-toplevel)/scripts/run_framework_matrix.sh" {{.CLI_ARGS}}

  test:all:
    desc: Unit + integration + e2e
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}} -v -m ""

  # ===================
  # Code Quality
  # ===================

  format:
    desc: Auto-format code with Black
    cmds:
      - poetry run black {{.SRC_DIR}} {{.TEST_DIR}}

  format:check:
    desc: Check code formatting without changes
    cmds:
      - poetry run black --check {{.SRC_DIR}} {{.TEST_DIR}}

  lint:
    desc: Check code for style violations with Ruff
    cmds:
      - poetry run ruff check {{.SRC_DIR}} {{.TEST_DIR}}

  lint:fix:
    desc: Lint and auto-fix issues
    cmds:
      - poetry run ruff check --fix {{.SRC_DIR}} {{.TEST_DIR}}

  typecheck:
    desc: Type check with mypy
    aliases: [mypy]
    cmds:
      - poetry run mypy {{.SRC_DIR}}

  # ===================
  # Combined Tasks
  # ===================

  check:
    desc: Run all quality checks without tests
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck

  before-push:
    desc: Per-package pre-push check (format, lint, typecheck, test with coverage)
    # Scope-leak guard (#174 sibling): this task tests ONLY agent-brain-mcp.
    # ROOT_DIR is the entrypoint Taskfile's dir — the monorepo root when the
    # root gate dispatches `mcp:before-push` (via includes), but THIS package
    # dir when a human runs `task before-push` from agent-brain-mcp/. The
    # latter gives a false-green that CI then catches. Fail fast (before the
    # slow install) instead. `install` is the first cmd, not a dep, so the
    # precondition blocks before any work on the standalone-subdir path.
    preconditions:
      - sh: 'test "{{.ROOT_DIR}}" = "$(git -C "{{.ROOT_DIR}}" rev-parse --show-toplevel)"'
        msg: |
          ✗ `task before-push` here runs ONLY the agent-brain-mcp package gate — not the full monorepo.
            That is a false-green: CI runs server + cli + uds + mcp and will catch gaps you can't see locally.
            Run the full gate from the repo root instead:
              cd "$(git rev-parse --show-toplevel)" && task before-push
            (To run just this package's checks on purpose, use `task mcp:before-push` from the repo root.)
    cmds:
      - task: install
      - task: format:check
      - task: lint
      - task: typecheck
      - task: test:cov

  pr-qa-gate:
    desc: PR quality gate with 80% coverage minimum (security-boundary code per plan DR)
    deps: [install]
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck
      - poetry run pytest {{.TEST_DIR}} --cov={{.SRC_DIR}} --cov-report=term-missing --cov-report=xml:coverage-mcp.xml --cov-fail-under=80

  oauth-cov:
    desc: >
      OAuth module coverage gate (90% CI hard / 85% local soft per 70-RESEARCH.md
      Open Q4). Locally defaults to 85% because keycloak-marked paths are skipped
      without a container (Pitfall 4). The BINDING 90% gate runs authoritatively in
      the CI Keycloak job (mcp-keycloak-integration.yml) which includes keycloak-
      marked tests and measures the full picture. Override threshold with
      COV_FAIL_UNDER=90 to reproduce the CI gate locally with a live container.
    vars:
      COV_FAIL_UNDER: '85'
    deps: [install]
    cmds:
      - >
        poetry run pytest {{.TEST_DIR}}
        --cov=agent_brain_mcp.oauth
        --cov-report=term-missing
        --cov-fail-under={{.COV_FAIL_UNDER | default "85"}}

  keycloak:
    desc: >
      Run the Keycloak-backed integration suite (CI/nightly — requires a running
      Keycloak container bootstrapped by scripts/keycloak_bootstrap.sh; opt-in).
      Runs all @pytest.mark.keycloak tests and skips cleanly when no container
      is present. Use KEYCLOAK_URL and AGENT_BRAIN_OAUTH_RESOURCE env vars to
      point at a non-default Keycloak instance.
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}} -v -m keycloak
