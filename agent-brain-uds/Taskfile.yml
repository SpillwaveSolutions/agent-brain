# Agent Brain UDS Task Runner
# https://taskfile.dev
#
# Per-package tasks; wired into root before-push and pr-qa-gate as of v10.2
# (Phase 55, closes DR-5 from docs/plans/2026-05-28-mcp-uds-transport-design.md
# §14 #5).

version: '3'

vars:
  PROJECT_NAME: agent-brain-uds
  SRC_DIR: agent_brain_uds
  TEST_DIR: tests

env:
  PYTHONPATH: './agent_brain_uds:./tests'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # ===================
  # Setup
  # ===================

  install:
    desc: Install project dependencies
    cmds:
      - poetry install

  # ===================
  # Build
  # ===================

  clean:
    desc: Remove build artifacts and temporary files
    cmds:
      - rm -rf dist build *.egg-info
      - rm -rf .pytest_cache .mypy_cache .ruff_cache
      - rm -rf htmlcov .coverage coverage.xml
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

  build:
    desc: Build the package
    deps: [clean]
    cmds:
      - poetry build

  # ===================
  # Testing
  # ===================

  test:
    desc: Run unit tests
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}} -v

  test:cov:
    desc: Run tests with coverage report
    aliases: [coverage]
    deps: [install]
    cmds:
      - poetry run pytest {{.TEST_DIR}} --cov={{.SRC_DIR}} --cov-report=term-missing --cov-report=html

  # ===================
  # Code Quality
  # ===================

  format:
    desc: Auto-format code with Black
    cmds:
      - poetry run black {{.SRC_DIR}} {{.TEST_DIR}}

  format:check:
    desc: Check code formatting without changes
    cmds:
      - poetry run black --check {{.SRC_DIR}} {{.TEST_DIR}}

  lint:
    desc: Check code for style violations with Ruff
    cmds:
      - poetry run ruff check {{.SRC_DIR}} {{.TEST_DIR}}

  lint:fix:
    desc: Lint and auto-fix issues
    cmds:
      - poetry run ruff check --fix {{.SRC_DIR}} {{.TEST_DIR}}

  typecheck:
    desc: Type check with mypy
    aliases: [mypy]
    cmds:
      - poetry run mypy {{.SRC_DIR}}

  # ===================
  # Combined Tasks
  # ===================

  check:
    desc: Run all quality checks without tests
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck

  before-push:
    desc: Per-package pre-push check (format, lint, typecheck, test with coverage)
    # Scope-leak guard (#174 sibling): this task tests ONLY agent-brain-uds.
    # ROOT_DIR is the entrypoint Taskfile's dir — the monorepo root when the
    # root gate dispatches `uds:before-push` (via includes), but THIS package
    # dir when a human runs `task before-push` from agent-brain-uds/. The
    # latter gives a false-green that CI then catches. Fail fast (before the
    # slow install) instead. `install` is the first cmd, not a dep, so the
    # precondition blocks before any work on the standalone-subdir path.
    preconditions:
      - sh: 'test "{{.ROOT_DIR}}" = "$(git -C "{{.ROOT_DIR}}" rev-parse --show-toplevel)"'
        msg: |
          ✗ `task before-push` here runs ONLY the agent-brain-uds package gate — not the full monorepo.
            That is a false-green: CI runs server + cli + uds + mcp and will catch gaps you can't see locally.
            Run the full gate from the repo root instead:
              cd "$(git rev-parse --show-toplevel)" && task before-push
            (To run just this package's checks on purpose, use `task uds:before-push` from the repo root.)
    cmds:
      - task: install
      - task: format:check
      - task: lint
      - task: typecheck
      - task: test:cov

  pr-qa-gate:
    desc: PR quality gate with 80% coverage minimum (security-boundary code per plan DR)
    deps: [install]
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck
      - poetry run pytest {{.TEST_DIR}} --cov={{.SRC_DIR}} --cov-report=term-missing --cov-report=xml:coverage-uds.xml --cov-fail-under=80
