# Framework Matrix (Nightly Advisory)
#
# ADVISORY ONLY — runs nightly against main; failure does NOT block PRs
# (framework SDK drift is expected); result published as a commit status
# tagged advisory.
#
# Trigger: nightly cron (07:00 UTC) + manual workflow_dispatch ONLY.
# This workflow deliberately omits push: and pull_request: triggers so it
# can never be marked a required PR check.

name: Framework Matrix (Nightly Advisory)

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC nightly (distinct from e2e-nightly's 06:00)
  workflow_dispatch:

jobs:
  framework-matrix:
    name: Framework Matrix (Advisory)
    runs-on: ubuntu-latest
    environment: ci-testing
    timeout-minutes: 90   # 7 frameworks sequential; each bootstraps its own venv

    steps:
      - name: Free up disk space
        run: |
          # Remove unnecessary tools to free up ~10GB (mirrors pr-qa-gate.yml)
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout code (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.43.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      # Install the local agent-brain packages at the job level so
      # agent-brain-serve and agent-brain-mcp are on PATH for the
      # seeded-server fixture in framework-matrix/conftest.py.
      # Without this the framework smoke tests' prerequisite check fails
      # and ALL tests skip silently — yielding a meaningless advisory green.
      - name: Install server dependencies
        run: |
          cd agent-brain-server
          poetry install

      - name: Install UDS package
        run: |
          cd agent-brain-uds
          poetry install

      - name: Install CLI with local server dependency
        run: |
          cd agent-brain-cli
          sed -i 's|agent-brain-rag = "^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-rag = {path = "../agent-brain-server", develop = false}|' pyproject.toml
          poetry lock --no-update
          poetry install
          git checkout pyproject.toml

      - name: Install MCP with local dependencies
        run: |
          cd agent-brain-mcp
          sed -i 's|agent-brain-rag = "^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-rag = {path = "../agent-brain-server", develop = false}|' pyproject.toml
          sed -i 's|agent-brain-uds = "^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-uds = {path = "../agent-brain-uds", develop = false}|' pyproject.toml
          poetry lock --no-update
          poetry install
          git checkout pyproject.toml

      - name: Run framework matrix (advisory)
        id: matrix
        continue-on-error: true
        env:
          FRAMEWORK_MATRIX: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: task mcp:framework-matrix

      - name: Post advisory commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.matrix.outcome }}';
            const state = outcome === 'success' ? 'success' : 'failure';
            const description = state === 'success'
              ? 'All framework adapters passed'
              : 'One or more framework adapters failed (advisory — does not block PRs)';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              context: 'framework-matrix (advisory)',
              description: description,
            });

      - name: Upload framework matrix artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: framework-matrix-results
          path: |
            framework-matrix/**/.venv/pytest-cache/
            framework-matrix/ts/test-results/
          retention-days: 7
          if-no-files-found: ignore
