# Publish to PyPI on Release
# Triggered when a new release is published on GitHub
#
# Security: Uses PyPI Trusted Publisher (OIDC) authentication - no API tokens needed
# Packages are published sequentially: server first, then CLI (depends on server for PyPI resolution)

name: Publish to PyPI

on:
  release:
    types: [published]
  # Allow manual re-runs after a partial-failure recovery (e.g. one of the
  # four publish jobs failed mid-release). Combined with skip-existing on
  # every publish step, re-dispatching against main re-publishes only the
  # missing packages. Use `gh workflow run publish-to-pypi.yml --ref main`.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with PyPI

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.43.3

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies (server)
        uses: actions/cache@v4
        with:
          path: agent-brain-server/.venv
          key: server-venv-${{ runner.os }}-${{ hashFiles('agent-brain-server/poetry.lock') }}
          restore-keys: |
            server-venv-${{ runner.os }}-

      - name: Cache Poetry dependencies (cli)
        uses: actions/cache@v4
        with:
          path: agent-brain-cli/.venv
          key: cli-venv-${{ runner.os }}-${{ hashFiles('agent-brain-cli/poetry.lock') }}
          restore-keys: |
            cli-venv-${{ runner.os }}-

      - name: Build server package first (CLI depends on it)
        run: |
          cd agent-brain-server
          poetry build
          echo "Built server package:"
          ls -la dist/

      - name: Install server from local build
        run: |
          cd agent-brain-server
          poetry install

      - name: Install UDS package
        run: |
          cd agent-brain-uds
          poetry install

      - name: Install CLI with local server + uds dependencies
        run: |
          cd agent-brain-cli
          # agent-brain-rag / agent-brain-uds may not be on PyPI yet for
          # this release; temporarily flip both to path deps.
          sed -i 's|agent-brain-rag = "\^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-rag = {path = "../agent-brain-server", develop = false}|' pyproject.toml
          sed -i 's|agent-brain-uds = "\^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-uds = {path = "../agent-brain-uds", develop = false}|' pyproject.toml
          poetry lock
          poetry install
          # Restore PyPI deps for consistency
          git checkout pyproject.toml

      - name: Install MCP with local server + uds dependencies
        run: |
          cd agent-brain-mcp
          sed -i 's|agent-brain-rag = "\^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-rag = {path = "../agent-brain-server", develop = false}|' pyproject.toml
          sed -i 's|agent-brain-uds = "\^[0-9]*\.[0-9]*\.[0-9]*"|agent-brain-uds = {path = "../agent-brain-uds", develop = false}|' pyproject.toml
          poetry lock
          poetry install
          git checkout pyproject.toml

      - name: Run linting
        run: task lint

      - name: Run type checking
        run: task typecheck

      - name: Run tests
        run: task test

  publish-server:
    name: Publish agent-brain-rag
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tag matches pyproject.toml version
        # On `release` events, the tag (e.g. v10.3.0) must match every
        # pyproject's version. On `workflow_dispatch` we're a recovery
        # path — GITHUB_REF_NAME is the dispatched branch name (usually
        # `main`), so the tag check would always fail. Skip the tag↔file
        # comparison but still cross-check that the four pyprojects
        # agree among themselves; downstream publishes are idempotent
        # via skip-existing.
        run: |
          # Get version from pyproject.toml
          SERVER_VERSION=$(grep '^version = ' agent-brain-server/pyproject.toml | cut -d'"' -f2)
          CLI_VERSION=$(grep '^version = ' agent-brain-cli/pyproject.toml | cut -d'"' -f2)
          UDS_VERSION=$(grep '^version = ' agent-brain-uds/pyproject.toml | cut -d'"' -f2)
          MCP_VERSION=$(grep '^version = ' agent-brain-mcp/pyproject.toml | cut -d'"' -f2)

          echo "Server pyproject.toml: $SERVER_VERSION"
          echo "CLI pyproject.toml: $CLI_VERSION"
          echo "UDS pyproject.toml: $UDS_VERSION"
          echo "MCP pyproject.toml: $MCP_VERSION"

          if [ "${{ github.event_name }}" = "release" ]; then
            # Get version from release tag (e.g., v3.0.0 → 3.0.0)
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            echo "Tag version: $TAG_VERSION"
            # Verify tag matches every pyproject
            for name in SERVER CLI UDS MCP; do
              eval "v=\$${name}_VERSION"
              if [ "$TAG_VERSION" != "$v" ]; then
                echo "ERROR: Tag ($TAG_VERSION) does not match $name version ($v)"
                exit 1
              fi
            done
            echo "✓ All versions aligned: $TAG_VERSION"
          else
            # workflow_dispatch recovery path — verify the four pyprojects
            # agree with each other so we never publish a mixed release.
            if [ "$SERVER_VERSION" != "$CLI_VERSION" ] \
              || [ "$SERVER_VERSION" != "$UDS_VERSION" ] \
              || [ "$SERVER_VERSION" != "$MCP_VERSION" ]; then
              echo "ERROR: pyproject versions disagree (server=$SERVER_VERSION cli=$CLI_VERSION uds=$UDS_VERSION mcp=$MCP_VERSION)"
              exit 1
            fi
            echo "✓ workflow_dispatch — all 4 pyprojects agree on $SERVER_VERSION"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - name: Build package
        run: poetry build
        working-directory: agent-brain-server

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent-brain-server/dist/
          skip-existing: true

  publish-uds:
    name: Publish agent-brain-uds
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - name: Build package
        run: poetry build
        working-directory: agent-brain-uds

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent-brain-uds/dist/
          skip-existing: true

  publish-cli:
    name: Publish agent-brain-cli
    needs: [quality-gate, publish-server, publish-uds]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for server + uds packages on PyPI
        run: |
          # Get version from release tag (e.g., v3.0.0 → 3.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in agent-brain-rag agent-brain-uds; do
            echo "Waiting for $pkg==$VERSION on PyPI..."
            for i in {1..30}; do
              if curl -sf "https://pypi.org/pypi/$pkg/$VERSION/json" > /dev/null; then
                echo "✓ Found $pkg==$VERSION on PyPI"
                break
              fi
              echo "Attempt $i/30 for $pkg: Not yet available, waiting 10s..."
              sleep 10
              if [ "$i" -eq 30 ]; then
                echo "✗ Timeout waiting for $pkg PyPI propagation"
                exit 1
              fi
            done
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - name: Build package
        run: poetry build
        working-directory: agent-brain-cli

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent-brain-cli/dist/
          skip-existing: true

  publish-mcp:
    name: Publish agent-brain-mcp
    needs: [quality-gate, publish-server, publish-uds]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for server + uds packages on PyPI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in agent-brain-rag agent-brain-uds; do
            echo "Waiting for $pkg==$VERSION on PyPI..."
            for i in {1..30}; do
              if curl -sf "https://pypi.org/pypi/$pkg/$VERSION/json" > /dev/null; then
                echo "✓ Found $pkg==$VERSION on PyPI"
                break
              fi
              echo "Attempt $i/30 for $pkg: Not yet available, waiting 10s..."
              sleep 10
              if [ "$i" -eq 30 ]; then
                echo "✗ Timeout waiting for $pkg PyPI propagation"
                exit 1
              fi
            done
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1

      - name: Flip path-deps to versioned PyPI deps before build
        # agent-brain-mcp's pyproject.toml carries path-deps on
        # agent-brain-rag / -uds / -cli for monorepo dev + test workflows.
        # PyPI legacy rejects wheels whose METADATA has any direct
        # dependency (Requires-Dist: pkg @ file:///...). Rewrite the three
        # path-deps to versioned PyPI deps pinned to this release's tag
        # before `poetry build` so the published wheel only declares
        # legal PyPI references. Done in-place on a runner checkout so
        # the source tree on main keeps its path-deps for local dev.
        # First failure mode that caught this: v10.3.0 publish — Issue #199.
        working-directory: agent-brain-mcp
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from agent-brain-mcp/pyproject.toml"
            exit 1
          fi
          echo "Flipping path-deps to ^${VERSION}"
          # Match either `pkg = {path = "..."}` or `pkg = { path = "..." }`,
          # tolerating extra keys (develop = false) and surrounding spaces.
          # Anchored at line start so we never touch a different occurrence.
          for pkg in agent-brain-rag agent-brain-uds agent-brain-cli; do
            sed -i -E "s|^${pkg}[[:space:]]*=[[:space:]]*\\{[^}]*\\}|${pkg} = \"^${VERSION}\"|" pyproject.toml
          done
          echo "--- agent-brain-mcp/pyproject.toml after flip ---"
          grep -E "^agent-brain-(rag|uds|cli)" pyproject.toml || true

      - name: Build package
        run: poetry build
        working-directory: agent-brain-mcp

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent-brain-mcp/dist/
          skip-existing: true
